syntax = "proto3";
package files;

service FilesService {
    rpc FetchFileId(FetchFileIdRequest) returns (FetchFileIdResponse);
    rpc FetchFileName(FetchFileNameRequest) returns (FetchFileNameResponse);
    rpc PurchaseFile(PurchaseFileRequest) returns (PurchaseFileResponse);
}

message FetchFileIdRequest {
    string file_name = 1;
}

message FetchFileIdResponse {
    string file_id = 1;
}

message FetchFileNameRequest {
    string file_id = 1;
}

message FetchFileNameResponse {
    string file_name = 1;
}

message PurchaseFileRequest {
    string file_id = 1;
    string buyer_id = 2;
}

message PurchaseFileResponse {
    bool success = 1;
}
