syntax = "proto3";
package payments;

service PaymentsService {
    rpc InitiatePaymentIntegration(UserPaymentDetails) returns (PaymentIntegrationResponse);
}

message UserPaymentDetails {
    string email = 1;
    string amount = 2;
    string reference = 3;
    string currency = 4;
}

message PaymentIntegrationResponse {
    string authorization_url = 1;
}
